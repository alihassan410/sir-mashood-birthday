<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Sir Mashood ur Rehman!</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Single high-performance Canvas for stars, balloons, petals, snow, and confetti -->
    <canvas id="effects-canvas"></canvas>

    <!-- SECTION 1: Cinematic Typing Intro -->
    <div id="typing-screen" class="screen-overlay active">
        <div class="typing-container">
            <div id="typing-box">
                <span id="typing-text"></span><span class="typing-cursor">|</span>
            </div>
        </div>
    </div>

    <!-- SECTION 2: Minimalist Celebration Stage -->
    <div id="celebration-screen" class="screen-overlay hidden">
        <div class="celebration-container">
            <div class="badge">July 17th</div>
            <h1 class="glow-text">Happy Birthday,<br><span class="highlight-gold">Sir Mashood ur Rehman</span></h1>
            <p class="lead-text">Wishing you a year filled with happiness, health, and inspiring leadership.</p>
            
            <footer class="celebration-footer">
                <p>Designed with respect & admiration by Ali Hassan & Abdul wahab | 2026</p>
            </footer>
        </div>
    </div>

    <!-- JavaScript logic -->
    <script src="script.js"></script>
</body>
</html>
